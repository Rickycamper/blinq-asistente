<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blinq — Consulta de Disponibilidad</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0d22a8;
    --blue-dark: #06124e;
    --blue-light: #1a35d4;
    --white: #ffffff;
    --gray: #f4f5f9;
    --text: #1a1a2e;
    --muted: #7a7a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--gray);
    min-height: 100vh;
    color: var(--text);
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
    padding: 28px 20px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.07);
    top: -150px; right: -100px;
  }
  .header::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
    bottom: -100px; left: -80px;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    position: relative;
    z-index: 1;
  }
  .logo span { opacity: 0.5; }
  .header-sub {
    color: rgba(255,255,255,0.65);
    font-size: 14px;
    font-weight: 500;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  /* SEARCH */
  .search-wrap {
    padding: 0 16px;
    margin-top: -22px;
    position: relative;
    z-index: 10;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .search-box {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(13,34,168,0.18);
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 12px;
  }
  .search-icon { font-size: 20px; flex-shrink: 0; }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
  }
  .search-input::placeholder { color: #bbb; font-weight: 400; }
  .search-clear {
    background: var(--gray);
    border: none;
    border-radius: 8px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .search-clear.visible { display: flex; }

  /* CHIPS */
  .chips-wrap {
    padding: 16px 16px 0;
    max-width: 600px;
    margin: 0 auto;
  }
  .chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    background: white;
    border: 1.5px solid #e0e3ef;
    color: var(--blue);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .chip:hover, .chip.active {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
  }

  /* MAIN */
  .main {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-sub { color: var(--muted); font-size: 14px; line-height: 1.5; }

  /* RESULTS */
  .results-count {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .results-count span { color: var(--blue); }

  .product-card {
    background: white;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .product-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(13,34,168,0.12);
  }

  .card-top {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #f0f0f8;
  }
  .card-brand {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .card-family {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .card-stock {
    padding: 12px 18px;
  }
  .stock-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .stock-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    background: var(--gray);
  }
  .stock-item.available { background: #e8f5e9; }
  .stock-item.unavailable { background: #fafafa; opacity: 0.6; }
  .stock-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .available .stock-dot { background: #22a855; }
  .unavailable .stock-dot { background: #ccc; }
  .stock-info { flex: 1; min-width: 0; }
  .stock-location {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .unavailable .stock-location { color: var(--muted); }
  .stock-status {
    font-size: 11px;
    color: var(--muted);
  }
  .available .stock-status { color: #22a855; font-weight: 600; }

  /* WA buttons */
  .card-actions {
    padding: 0 18px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #25d366;
    color: white;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 12px;
    border-radius: 8px;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .wa-btn:hover { background: #1db954; transform: scale(1.02); }
  .wa-btn svg { width: 14px; height: 14px; fill: white; flex-shrink: 0; }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 40px 20px;
  }
  .no-results-emoji { font-size: 40px; margin-bottom: 12px; }
  .no-results-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .no-results-sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .contact-all {
    background: white;
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .contact-all-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
  }
  .contact-list { display: flex; flex-direction: column; gap: 8px; }
  .contact-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--gray);
    border-radius: 10px;
  }
  .contact-loc { font-size: 13px; font-weight: 600; color: var(--text); }
  .contact-wa {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #25d366;
    color: white;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 7px;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 24px 16px 32px;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>

let currentQuery = '';

function normalize(str) {
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function searchInventory(query) {
  if (!query || query.trim().length < 2) return [];
  const q = normalize(query.trim());
  const words = q.split(/\s+/).filter(w => w.length > 1);
  const seen = new Set();
  const results = [];

  for (const item of INVENTORY) {
    const name = normalize(item.nombre);
    const brand = normalize(item.marca);
    const family = normalize(item.familia);
    const key = item.nombre;
    if (seen.has(key)) continue;

    let score = 0;
    for (const word of words) {
      if (name.includes(word)) score += 3;
      if (brand.includes(word)) score += 2;
      if (family.includes(word)) score += 1;
    }
    if (score > 0) {
      seen.add(key);
      results.push({ ...item, score });
    }
  }
  return results.sort((a, b) => b.score - a.score).slice(0, 12);
}

function getStockByBranch(item) {
  const merged = {};
  for (const [key, branch] of Object.entries(STOCK_KEYS)) {
    if (!merged[branch]) merged[branch] = 0;
    merged[branch] += item.stock[key] || 0;
  }
  // Add Taller separately (no stock key maps to it)
  return merged;
}

function makeWALink(branch, productName) {
  const info = BRANCHES[branch];
  if (!info) return null;
  const msg = encodeURIComponent(`Hola, quiero consultar disponibilidad de: ${productName}`);
  return `https://wa.me/${info.wa}?text=${msg}`;
}

function renderResults(results) {
  const main = document.getElementById('mainContent');

  if (results.length === 0 && currentQuery.length >= 2) {
    main.innerHTML = `
      <div class="no-results">
        <div class="no-results-emoji">🔎</div>
        <div class="no-results-title">No encontramos ese producto</div>
        <div class="no-results-sub">Puedes contactarnos directamente y con gusto te ayudamos.</div>
      </div>
      ${renderContactAll()}
    `;
    return;
  }

  if (results.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">📦</div>
        <div class="empty-title">¿Qué estás buscando?</div>
        <div class="empty-sub">Escribe el nombre del producto, marca o categoría y te decimos en qué sucursal está disponible.</div>
      </div>
    `;
    return;
  }

  let html = `<div class="results-count">Se encontraron <span>${results.length}</span> producto${results.length !== 1 ? 's' : ''}</div>`;

  for (const item of results) {
    const stockByBranch = getStockByBranch(item);
    const availableBranches = Object.entries(stockByBranch).filter(([,v]) => v > 0);
    const hasStock = availableBranches.length > 0;

    let stockHtml = '<div class="stock-grid">';
    for (const [branch, waInfo] of Object.entries(BRANCHES)) {
      const qty = stockByBranch[branch] || 0;
      const avail = qty > 0;
      stockHtml += `
        <div class="stock-item ${avail ? 'available' : 'unavailable'}">
          <div class="stock-dot"></div>
          <div class="stock-info">
            <div class="stock-location">${branch}</div>
            <div class="stock-status">${avail ? 'Disponible' : 'Sin stock'}</div>

    }
    stockHtml += '</div>';

    let actionsHtml = '';
    if (hasStock) {
      actionsHtml = '<div class="card-actions">';

        if (link) {
          actionsHtml += `
            <a href="${link}" target="_blank" class="wa-btn">
              <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
              ${branch.split('/')[0].trim()}
            </a>`;
        }
      }
      actionsHtml += '</div>';
    }

    html += `
      <div class="product-card">
        <div class="card-top">
          <div class="card-brand">${item.marca}</div>
          <div class="card-name">${item.nombre}</div>
          <div class="card-family">${item.familia}</div>
        </div>
        <div class="card-stock">
          <div class="stock-title">Disponibilidad por sucursal</div>
          ${stockHtml}
        </div>
        ${actionsHtml}
      </div>`;
  }

  main.innerHTML = html;
}

let debounceTimer;
function handleSearch() {
  const val = document.getElementById('searchInput').value;
  currentQuery = val;
  document.getElementById('clearBtn').className = val ? 'search-clear visible' : 'search-clear';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    renderResults(searchInventory(val));
  }, 200);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('clearBtn').className = 'search-clear';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  renderResults([]);
}

function searchChip(term) {
  document.getElementById('searchInput').value = term;
  currentQuery = term;
  document.getElementById('clearBtn').className = 'search-clear visible';
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.textContent.toLowerCase().includes(term.toLowerCase()));
  });
  renderResults(searchInventory(term));
}
</script>
