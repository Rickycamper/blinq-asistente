<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blinq — Asistente Instagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  .header {
    width: 100%;
    max-width: 700px;
    background: #0d22a8;
    border-radius: 16px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(13,34,168,0.3);
  }
  .header-logo {
    font-size: 26px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
  }
  .header-logo span { opacity: 0.6; }
  .header-sub {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .card {
    width: 100%;
    max-width: 700px;
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* Config section */
  .config-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .config-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-row input:focus { border-color: #0d22a8; }
  .config-row label {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
    display: block;
  }
  .config-field { flex: 1; }

  /* Input area */
  .message-area {
    width: 100%;
    min-height: 100px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .message-area:focus { border-color: #0d22a8; }
  .message-area::placeholder { color: #bbb; }

  .btn-generate {
    width: 100%;
    padding: 14px;
    background: #0d22a8;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-generate:hover { background: #0a1a8a; }
  .btn-generate:active { transform: scale(0.99); }
  .btn-generate:disabled { background: #bbb; cursor: not-allowed; }

  /* Response */
  .response-box {
    background: #f8f9ff;
    border: 1.5px solid #d0d7ff;
    border-radius: 12px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    color: #1a1a2e;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 60px;
  }

  .response-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .btn-copy {
    flex: 1;
    padding: 11px;
    background: #0d22a8;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-copy:hover { background: #0a1a8a; }
  .btn-copy.copied { background: #22a855; }
  .btn-clear {
    padding: 11px 18px;
    background: white;
    color: #888;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: #0d22a8; color: #0d22a8; }

  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #888;
    font-size: 14px;
    padding: 12px 0;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #0d22a8; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

  .tip {
    background: #fffbeb;
    border: 1.5px solid #fde68a;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #92400e;
    margin-top: 12px;
    line-height: 1.5;
  }

  .whatsapp-num {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e8f5e9;
    border: 1px solid #a5d6a7;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: #1b5e20;
    font-weight: 600;
    margin-top: 8px;
  }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .example-chip {
    background: #f0f2ff;
    border: 1px solid #c7d0ff;
    color: #0d22a8;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .example-chip:hover { background: #0d22a8; color: white; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">blinq<span>.</span></div>
    <div class="header-sub">Asistente de respuestas · Instagram DMs</div>
  </div>
  <div class="header-badge">🤖 IA + Inventario en vivo</div>
</div>

<!-- Config -->
<div class="card">
  <div class="card-title">⚙️ Configuración</div>
  <div class="config-row">
    <div class="config-field">
      <label>Número de WhatsApp del vendedor</label>
      <input type="text" id="whatsappNum" placeholder="ej: +507 6000-0000" value="+507 6000-0000">
    </div>
    <div class="config-field">
      <label>Nombre del agente (opcional)</label>
      <input type="text" id="agentName" placeholder="ej: Carlos">
    </div>
  </div>
</div>

<!-- Input -->
<div class="card">
  <div class="card-title">💬 Mensaje del cliente</div>
  <div class="examples">
    <div class="example-chip" onclick="setExample('Tienen cartuchos HP 954XL negro?')">Cartucho HP</div>
    <div class="example-chip" onclick="setExample('Quiero una impresora Epson, qué tienen disponible?')">Impresoras Epson</div>
    <div class="example-chip" onclick="setExample('Tienen mouse logitech?')">Mouse Logitech</div>
    <div class="example-chip" onclick="setExample('Cuál es su número de whatsapp?')">WhatsApp</div>
    <div class="example-chip" onclick="setExample('Tienen tóner Canon para la IR 1643?')">Tóner Canon</div>
    <div class="example-chip" onclick="setExample('Buenos días, tienen cámaras Hikvision disponibles?')">Cámaras</div>
  </div>
  <textarea class="message-area" id="messageInput" placeholder="Pega aquí el mensaje del cliente de Instagram..." style="margin-top:12px"></textarea>
  <button class="btn-generate" id="generateBtn" onclick="generateResponse()">✨ Generar Respuesta</button>
</div>

<!-- Response -->
<div class="card" id="responseCard" style="display:none">
  <div class="card-title">📋 Respuesta sugerida</div>
  <div id="loadingIndicator" class="loading" style="display:none">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Consultando inventario y generando respuesta...</span>
  </div>
  <div class="response-box" id="responseText" style="display:none"></div>
  <div class="response-actions" id="responseActions" style="display:none">
    <button class="btn-copy" id="copyBtn" onclick="copyResponse()">📋 Copiar respuesta</button>
    <button class="btn-clear" onclick="clearAll()">Limpiar</button>
  </div>
</div>

  for (const item of INVENTORY) {
    const name = item.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const brand = item.marca.toLowerCase();
    const family = item.familia.toLowerCase();
    
    let score = 0;
    for (const word of words) {
      if (name.includes(word)) score += 3;
      if (brand.includes(word)) score += 2;
      if (family.includes(word)) score += 1;
    }
    if (score > 0) {
      const totalStock = Object.values(item.stock).reduce((a,b) => a+b, 0);
      results.push({ ...item, score, totalStock });
    }
  }
  
  return results.sort((a,b) => b.score - a.score).slice(0, 8);
}

function formatStockSummary(item) {
  const branches = Object.entries(item.stock).filter(([,v]) => v > 0);
  if (branches.length === 0) return "❌ Sin stock";
  return "✅ Disponible en: " + branches.map(([loc]) => loc).join(", ");
}

function setExample(text) {
  document.getElementById('messageInput').value = text;
}

function clearAll() {
  document.getElementById('messageInput').value = '';
  document.getElementById('responseCard').style.display = 'none';
}

async function generateResponse() {
  const message = document.getElementById('messageInput').value.trim();
  if (!message) return;

  const whatsapp = document.getElementById('whatsappNum').value.trim() || '+507 6000-0000';
  const agent = document.getElementById('agentName').value.trim();
  
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';
  
  document.getElementById('responseCard').style.display = 'block';
  document.getElementById('loadingIndicator').style.display = 'flex';
  document.getElementById('responseText').style.display = 'none';
  document.getElementById('responseActions').style.display = 'none';

  // Search inventory
  const results = searchInventory(message);
  
  let inventoryContext = '';
  if (results.length > 0) {
    inventoryContext = `\n\nPRODUCTOS ENCONTRADOS EN INVENTARIO:\n`;
    results.forEach(item => {
      const hasStock = Object.values(item.stock).some(v => v > 0);
      const branches = Object.entries(item.stock).filter(([,v]) => v > 0).map(([loc]) => loc);
      inventoryContext += `- ${item.nombre} (${item.marca}): ${hasStock ? 'DISPONIBLE en ' + branches.join(', ') : 'SIN STOCK'}\n`;
    });
  } else {
    inventoryContext = `\n\nNo se encontraron productos específicos en el inventario para esta consulta.`;
  }

  const systemPrompt = `Eres el asistente de atención al cliente de Blinq Panama, empresa de tecnología. Respondes mensajes de Instagram de manera profesional, cordial y concisa.

REGLAS:
- Tono profesional pero cercano (tutear está bien)
- Si el producto está disponible: confirma disponibilidad y ramas donde hay stock, luego invita a contactar por WhatsApp
- Si no está disponible: sé honesto y ofrece alternativa o redirige a WhatsApp
- Siempre incluye el número de WhatsApp al final: ${whatsapp}${agent ? ' (preguntar por ' + agent + ')' : ''}
- Respuesta corta: máximo 4-5 líneas
- No uses emojis excesivos, máximo 2-3
- No menciones precios
- Responde en español
- Si la consulta no es sobre productos, responde de forma útil y profesional`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: "user",
          content: `Mensaje del cliente en Instagram: "${message}"${inventoryContext}\n\nGenera una respuesta apropiada para este cliente.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(c => c.type === 'text')?.text || 'Error al generar respuesta.';

    document.getElementById('loadingIndicator').style.display = 'none';
    document.getElementById('responseText').style.display = 'block';
    document.getElementById('responseText').textContent = text;
    document.getElementById('responseActions').style.display = 'flex';

  } catch (err) {
    document.getElementById('loadingIndicator').style.display = 'none';
    document.getElementById('responseText').style.display = 'block';
    document.getElementById('responseText').textContent = 'Error de conexión. Verifica tu conexión e intenta de nuevo.';
    document.getElementById('responseActions').style.display = 'flex';
  }

  btn.disabled = false;
  btn.textContent = '✨ Generar Respuesta';
}

async function copyResponse() {
  const text = document.getElementById('responseText').textContent;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✅ ¡Copiado!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '📋 Copiar respuesta';
    btn.classList.remove('copied');
  }, 2000);
}

document.getElementById('messageInput').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') generateResponse();
});
</script>
